<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cater2Me · This Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1920px; height: 1080px; overflow: hidden; background: #0C0C0C;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
#stage { width: 1920px; height: 1080px; position: relative; overflow: hidden; }

/* SLIDE */
.slide {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  opacity: 0; transform: translateY(28px); pointer-events: none;
  transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
}
.slide.active  { opacity: 1; transform: translateY(0); pointer-events: all; }
.slide.leaving { opacity: 0; transform: translateY(-28px); transition: opacity 0.5s ease, transform 0.5s ease; }

#stage { --accent: #FF4347; }

/* TOP BAR */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 36px 80px 0; flex-shrink: 0;
}
.top-right { display: flex; align-items: center; gap: 18px; }
.week-tag { font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase; color: #fff; font-weight: 800; }
.top-bar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.c2m-wordmark { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 17px; color: #fff; letter-spacing: -0.02em; }

/* DAY HERO */
.day-hero {
  padding: 36px 80px 0; flex-shrink: 0;
}
.eyebrow {
  font-size: 13px; letter-spacing: 0.26em; text-transform: uppercase;
  color: var(--accent); font-weight: 700; margin-bottom: 10px;
  opacity: 0; transform: translateX(-14px);
  transition: opacity 0.5s 0.1s ease, transform 0.5s 0.1s ease;
}
.slide.active .eyebrow { opacity: 1; transform: translateX(0); }

.hero-row {
  display: flex; align-items: baseline; gap: 32px;
}
.day-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 148px; line-height: 0.88;
  color: #fff; letter-spacing: 0.01em;
  opacity: 0; transition: opacity 0.5s 0.06s ease;
}
.slide.active .day-name { opacity: 1; }
.day-date {
  font-size: 28px; font-weight: 800; color: var(--accent);
  letter-spacing: -0.01em; padding-bottom: 14px;
  opacity: 0; transform: translateX(-12px);
  transition: opacity 0.5s 0.18s ease, transform 0.5s 0.18s ease;
}
.slide.active .day-date { opacity: 1; transform: translateX(0); }

/* DIVIDER */
.divider-wrap { padding: 24px 80px 0; flex-shrink: 0; }
.divider { height: 1px; background: rgba(255,255,255,0.06); position: relative; }
.divider::after {
  content: ''; position: absolute; left: 0; top: -1px;
  width: 0; height: 3px; background: var(--accent); border-radius: 2px;
  transition: width 0.7s 0.3s cubic-bezier(0.22,1,0.36,1);
}
.slide.active .divider::after { width: 200px; }

/* VENDORS */
.vendors-section {
  flex: 1; display: flex; flex-direction: column;
  padding: 0 80px; min-height: 0; justify-content: center;
}
.vendors-label {
  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,255,255,0.35); font-weight: 700;
  margin-bottom: 28px; flex-shrink: 0; text-align: center;
}
.vendors-grid {
  display: flex; flex-direction: row;
  justify-content: center; align-items: flex-start;
  gap: 28px; flex-wrap: nowrap;
}

/* VENDOR CARD */
.vendor-card {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  flex: 1; max-width: 210px;
  opacity: 0.32; transform: scale(0.93); filter: saturate(0.3) brightness(0.8);
  transition: opacity 0.6s cubic-bezier(0.34,1.56,0.64,1),
              transform 0.6s cubic-bezier(0.34,1.56,0.64,1),
              filter 0.6s ease;
}
.vendor-card.entering { opacity: 0; transform: scale(0.72) translateY(28px); transition: none; }
.vendor-card.popping  {
  opacity: 0.32; transform: scale(0.93); filter: saturate(0.3) brightness(0.8);
  transition: opacity 0.55s cubic-bezier(0.34,1.56,0.64,1), transform 0.55s cubic-bezier(0.34,1.56,0.64,1), filter 0.55s ease;
}
.vendor-card.lit {
  opacity: 1; transform: scale(1.1) translateY(-8px); filter: saturate(1.3) brightness(1.15);
  transition: opacity 0.5s cubic-bezier(0.34,1.56,0.64,1), transform 0.5s cubic-bezier(0.34,1.56,0.64,1), filter 0.5s ease;
}
.vendor-card.lit .logo-ring {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.07), 0 0 28px 8px rgba(255,255,255,0.1);
}
.vendor-card.lit .vendor-name { color: #fff; text-shadow: 0 0 18px rgba(255,255,255,0.3); }

/* LOGO */
.logo-shell { position: relative; width: 148px; height: 148px; flex-shrink: 0; }
.logo-ring { position: absolute; inset: -3px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.08); transition: border-color 0.5s ease, box-shadow 0.5s ease; }
.logo-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background: #1C1C1C; }
.logo-fallback {
  display: none; width: 100%; height: 100%; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
  align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--accent);
}
.vendor-name {
  font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.6);
  text-align: center; line-height: 1.2; letter-spacing: -0.01em;
  transition: color 0.5s ease, text-shadow 0.5s ease;
  max-width: 180px;
}

/* BOTTOM BAR */
.bottom-bar {
  flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 0 80px 32px; height: 68px;
}
.time-info { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 700; letter-spacing: 0.06em; }
.dots { display: flex; gap: 8px; align-items: center; }
.dot { height: 6px; width: 6px; border-radius: 3px; background: rgba(255,255,255,0.18); transition: width 0.4s ease, background 0.4s ease; }
.dot.on { background: var(--accent); width: 24px; }

/* TIMER BAR */
#timer-bar { position: fixed; bottom: 0; left: 0; height: 3px; width: 0; border-radius: 0 2px 0 0; }

/* LOADING */
#loader { position: fixed; inset: 0; background: #0C0C0C; display: flex; align-items: center; justify-content: center; z-index: 99; transition: opacity 0.5s ease; }
#loader svg { height: 28px; opacity: 0.3; }

/* RIPPLE */
@keyframes ripple { from { transform: translate(-50%,-50%) scale(0); opacity: 0.4; } to { transform: translate(-50%,-50%) scale(3.5); opacity: 0; } }
.ripple-dot { position: fixed; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); pointer-events: none; animation: ripple 0.5s ease-out forwards; }
</style>
</head>

const ACCENTS = ['#FF4347','#00C8DC','#C850FF','#FF8C00','#00D68F'];
const SLIDE_DURATION = 20000; // 20 seconds per day
const SPOT_DURATION  = 2500;  // 2.5 seconds per vendor spotlight
const SPOT_INTRO     = 1000;

let DAYS = [], WEEK_LABEL = '';
let current = 0, spotTimer = null, autoTimer = null, barRAF = null, barStart = null;

function initials(name) {
  return name.replace(/[^a-zA-Z\s]/g,'').trim()
    .split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
}

function buildSlides() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  DAYS.forEach((day, idx) => {
    const accent = ACCENTS[idx % ACCENTS.length];
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.idx = idx;
    slide.dataset.accent = accent;
    slide.style.setProperty('--accent', accent);
    slide.style.background = `radial-gradient(ellipse 80% 50% at 50% 30%, ${accent}1a 0%, #0C0C0C 65%)`;

    const vendorHTML = day.vendors.map(v => `
      <div class="vendor-card">
        <div class="logo-shell">
          <div class="logo-ring"></div>
          <img class="logo-img" src="${v.logo}" alt="${v.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="logo-fallback">${initials(v.name)}</div>
        </div>
        <div class="vendor-name">${v.name}</div>
      </div>`).join('');

    const dotsHTML = DAYS.map((_,di) =>
      `<div class="dot${di===idx?' on':''}"></div>`).join('');

    slide.innerHTML = `
      <div class="top-bar">
        ${LOGO_SVG}
        <div class="top-right">
          <span class="week-tag">Week of ${WEEK_LABEL}</span>
          <div class="top-bar-divider"></div>
          <span class="c2m-wordmark">cater2me</span>
        </div>
      </div>
      <div class="day-hero">
        <div class="eyebrow">What's being served in Boston on</div>
        <div class="hero-row">
          <div class="day-name">${day.day}</div>
          <div class="day-date">${day.date} &nbsp;·&nbsp; Lunch</div>
        </div>
      </div>
      <div class="divider-wrap"><div class="divider"></div></div>
      <div class="vendors-section">
        <div class="vendors-label">Choose your lunch on Cater2Me</div>
        <div class="vendors-grid">${vendorHTML}</div>
      </div>
      <div class="bottom-bar">
        <span class="time-info"></span>
        <div class="dots">${dotsHTML}</div>
      </div>`;

    stage.appendChild(slide);
  });

  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 500);

  activateSlide(0);
  autoTimer = setTimeout(advance, SLIDE_DURATION);
}

/* ── Spotlight ─────────────────────────────────────────────────── */
function clearSpotlight() {
  clearInterval(spotTimer); spotTimer = null;
  document.querySelectorAll('.vendor-card.lit').forEach(c => c.classList.remove('lit'));
}
function runSpotlight(cards) {
  let si = 0;
  clearInterval(spotTimer);
  const shine = () => {
    cards.forEach(c => c.classList.remove('lit'));
    cards[si].classList.add('lit');
    si = (si + 1) % cards.length;
  };
  shine();
  spotTimer = setInterval(shine, SPOT_DURATION);
}

/* ── Enter vendors ─────────────────────────────────────────────── */
function enterVendors(slide) {
  const cards = Array.from(slide.querySelectorAll('.vendor-card'));
  cards.forEach(c => { c.classList.remove('popping','lit'); c.classList.add('entering'); });
  cards.forEach((card, i) => setTimeout(() => {
    card.classList.remove('entering'); card.classList.add('popping');
  }, 180 + i * 90));
  setTimeout(() => runSpotlight(cards), 180 + (cards.length - 1) * 90 + SPOT_INTRO);
}

/* ── Slide switching ───────────────────────────────────────────── */
const timerBar = document.getElementById('timer-bar');

function activateSlide(idx) {
  const slides = Array.from(document.querySelectorAll('.slide'));
  if (!slides.length) return;
  clearSpotlight();

  const prev = current;
  slides[prev].classList.remove('active');
  slides[prev].classList.add('leaving');
  setTimeout(() => slides[prev].classList.remove('leaving'), 600);

  current = ((idx % DAYS.length) + DAYS.length) % DAYS.length;
  const next = slides[current];
  next.classList.add('active');

  timerBar.style.background = next.dataset.accent;
  enterVendors(next);

  cancelAnimationFrame(barRAF);
  timerBar.style.transition = 'none'; timerBar.style.width = '0%'; barStart = null;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    barStart = performance.now();
    const tick = now => {
      const pct = Math.min((now - barStart) / SLIDE_DURATION * 100, 100);
      timerBar.style.width = pct + '%';
      if (pct < 100) barRAF = requestAnimationFrame(tick);
    };
    barRAF = requestAnimationFrame(tick);
  }));
}

function advance() {
  clearTimeout(autoTimer);
  activateSlide(current + 1);
  autoTimer = setTimeout(advance, SLIDE_DURATION);
}

document.getElementById('stage').addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple-dot';
  r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
  clearTimeout(autoTimer); activateSlide(current + 1); autoTimer = setTimeout(advance, SLIDE_DURATION);
});

function boot(d) {
  WEEK_LABEL = d.week;
  DAYS = d.days;
  if (document.fonts) document.fonts.ready.then(buildSlides); else setTimeout(buildSlides, 300);
}

fetch('./data.json?v=' + Date.now())
  .then(r => r.json())
  .then(d => boot(d))
  .catch(() => boot(FALLBACK_DATA));
</script>
